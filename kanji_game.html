<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんじ れんしゅうゲーム</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
    background: #f5f4ef;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  #app {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 20px;
    padding: 1.8rem 1.5rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 1.2rem;
  }
  /* Grade / mode buttons */
  .row-label {
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
    margin-top: 14px;
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .sel-btn {
    flex: 1;
    padding: 9px 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    background: #fff;
    color: #555;
    transition: all .15s;
  }
  .sel-btn.active {
    background: #e8f7f1;
    border-color: #1D9E75;
    color: #0f6e56;
    font-weight: 700;
  }
  /* Progress */
  .progress-wrap {
    height: 8px;
    background: #eee;
    border-radius: 99px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: #1D9E75;
    transition: width .35s ease;
  }
  /* Score bar */
  .score-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.2rem;
  }
  .metric {
    background: #f5f4ef;
    border-radius: 12px;
    padding: 10px 16px;
    flex: 1;
  }
  .metric .ml { font-size: 11px; color: #888; }
  .metric .mv { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  /* Question box */
  .qbox {
    background: #fff;
    border: 1.5px solid #eee;
    border-radius: 18px;
    padding: 1.4rem 1.2rem;
    margin-bottom: .8rem;
    position: relative;
    overflow: hidden;
  }
  .kanji-big {
    text-align: center;
    font-size: 100px;
    line-height: 1.1;
    color: #1a1a1a;
    margin-bottom: .6rem;
    user-select: none;
  }
  .qtext {
    font-size: 16px;
    color: #333;
    text-align: center;
    margin-bottom: 1rem;
    font-weight: 500;
  }
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .cbtn {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 13px 8px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    color: #333;
    transition: background .12s, border-color .12s;
    font-weight: 500;
  }
  .cbtn:hover { background: #f5f4ef; }
  .cbtn.correct { background: #e8f7f1; border-color: #1D9E75; color: #0f6e56; }
  .cbtn.wrong   { background: #fdecea; border-color: #e24b4a; color: #a32d2d; }
  .cbtn.show-correct { background: #e8f7f1; border-color: #1D9E75; color: #0f6e56; }
  /* Feedback */
  .feedback {
    text-align: center;
    font-size: 15px;
    min-height: 24px;
    margin: 10px 0 6px;
    font-weight: 500;
  }
  .hint-area {
    font-size: 13px;
    color: #666;
    margin-bottom: 1rem;
    line-height: 1.9;
    background: #f9f9f7;
    border-radius: 10px;
    padding: .8rem 1rem;
  }
  /* Next / start button */
  .main-btn {
    display: block;
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    border: none;
    border-radius: 14px;
    background: #1D9E75;
    color: #fff;
    transition: background .15s, transform .1s;
  }
  .main-btn:hover { background: #178a64; }
  .main-btn:active { transform: scale(0.98); }
  .sub-btn {
    display: block;
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    border: 1.5px solid #ddd;
    border-radius: 14px;
    background: #fff;
    color: #555;
    margin-top: 8px;
    transition: background .12s;
  }
  .sub-btn:hover { background: #f5f4ef; }
  /* 花丸 overlay */
  #maru-overlay {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
    border-radius: 18px;
    background: rgba(255,255,255,0.6);
  }
  #maru-overlay.show { display: flex; }
  @keyframes stamp {
    0%   { transform: scale(2.8); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  /* Result */
  .result-box { text-align: center; padding: 1.5rem .5rem; }
  .result-big { font-size: 64px; margin-bottom: 10px; }
  .result-score { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .result-comment { font-size: 15px; color: #666; margin-bottom: 1.8rem; }
  /* Stars row in result */
  .stars { font-size: 28px; letter-spacing: 4px; margin-bottom: 1rem; }

  @media (max-width: 400px) {
    .kanji-big { font-size: 80px; }
    #maru-stamp { font-size: 100px; }
  }
</style>
</head>

const gradeLabel={g1:'1年生',g2:'2年生',g3:'3年生',g4:'4年生'};

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function playCorrect(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523.25,0],[659.25,0.12],[783.99,0.24],[1046.5,0.38]].forEach(([freq,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(0.28,ctx.currentTime+t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.32);
    });
  }catch(e){}
}

    o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';o.frequency.value=160;
    g.gain.setValueAtTime(0.22,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.38);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.38);
  }catch(e){}
}

function showMaru(){
  const ov=document.getElementById('maru-overlay');
  if(!ov)return;
  const svg=document.getElementById('maru-svg');
  if(!svg)return;
  const ns='http://www.w3.org/2000/svg';
  svg.innerHTML='';
  const cx=150,cy=150,r=118;
  const sakura='🌸';
  const count=14;
  for(let i=0;i<count;i++){
    const angle=(2*Math.PI/count)*i - Math.PI/2;
    const x=cx+r*Math.cos(angle);
    const y=cy+r*Math.sin(angle);
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',x);
    t.setAttribute('y',y);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-size','26');
    t.textContent=sakura;
    svg.appendChild(t);
  }
  // center text line 1
  const t1=document.createElementNS(ns,'text');
  t1.setAttribute('x','150');t1.setAttribute('y','132');
  t1.setAttribute('text-anchor','middle');t1.setAttribute('dominant-baseline','middle');
  t1.setAttribute('font-size','28');t1.setAttribute('font-weight','900');
  t1.setAttribute('fill','#e8233a');
  t1.setAttribute('font-family','Hiragino Kaku Gothic ProN,Meiryo,sans-serif');
  t1.textContent='大変よく';
  svg.appendChild(t1);
  const t2=document.createElementNS(ns,'text');
  t2.setAttribute('x','150');t2.setAttribute('y','168');
  t2.setAttribute('text-anchor','middle');t2.setAttribute('dominant-baseline','middle');
  t2.setAttribute('font-size','28');t2.setAttribute('font-weight','900');
  t2.setAttribute('fill','#e8233a');
  t2.setAttribute('font-family','Hiragino Kaku Gothic ProN,Meiryo,sans-serif');
  t2.textContent='できました';
  svg.appendChild(t2);
  ov.classList.remove('show');
  void ov.offsetWidth;
  ov.classList.add('show');
}

function buildQuestions(){
  const pool=DB[grade]; let qs=[];
  pool.forEach(item=>{
    let matched=item.q;
    if(mode==='strokes') matched=item.q.filter(q=>q.type==='strokes'||q.type==='order');
    else if(mode==='reading') matched=item.q.filter(q=>q.type==='on'||q.type==='kun');
    matched.forEach(q=>qs.push({...q,kanji:item.k,order:item.order,on:item.on,kun:item.kun}));
  });
  shuffle(qs);
  questions=qs.slice(0,12);
  current=0; score=0; answered=false;
}

function render(){
  const app=document.getElementById('app');

  if(questions.length===0){
    app.innerHTML=`
      <h1>かんじ れんしゅうゲーム</h1>
      <p class="sub">学年とモードをえらんでね！</p>
      <div class="row-label">学年</div>
      <div class="btn-row">${['g1','g2','g3','g4'].map(g=>`<button class="sel-btn ${grade===g?'active':''}" onclick="setGrade('${g}')">${gradeLabel[g]}</button>`).join('')}</div>
      <div class="row-label">もんだいのしゅるい</div>
      <div class="btn-row">${['strokes','reading','all'].map(m=>`<button class="sel-btn ${mode===m?'active':''}" onclick="setMode('${m}')">${modeLabel[m]}</button>`).join('')}</div>
      <br>
      <button class="main-btn" onclick="startGame()">ゲームスタート！</button>`;
    return;
  }

  if(current>=questions.length){
    const pct=Math.round(score/questions.length*100);
    const face=pct===100?'💮':pct>=75?'🌟':pct>=50?'😊':'💪';
    const msg=pct===100?'かんぺき！すごいね！':pct>=75?'よくできました！':pct>=50?'もう少しでかんぺき！':'もう一度れんしゅうしよう！';
    const stars='⭐'.repeat(Math.round(pct/100*5));
    app.innerHTML=`
      <h1>かんじ れんしゅうゲーム</h1>
      <div class="result-box">
        <div class="result-big">${face}</div>
        <div class="stars">${stars}</div>
        <div class="result-score">${score} / ${questions.length} もんせいかい！</div>
        <div class="result-comment">${msg}<br><span style="font-size:12px;color:#aaa">${gradeLabel[grade]} ・ ${modeLabel[mode]}モード</span></div>
        <button class="main-btn" onclick="startGame()">もういちど！</button>
        <button class="sub-btn" onclick="backMenu()">メニューにもどる</button>
      </div>`;
    return;
  }

  const q=questions[current];
  const pct=Math.round(current/questions.length*100);
  app.innerHTML=`
    <h1>かんじ れんしゅうゲーム</h1>
    <p class="sub">${gradeLabel[grade]} ・ ${modeLabel[mode]}モード</p>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="score-bar">
      <div class="metric"><div class="ml">もんだい</div><div class="mv">${current+1} / ${questions.length}</div></div>
      <div class="metric"><div class="ml">せいかい</div><div class="mv" id="sv">${score}</div></div>
    </div>
    <div class="qbox" id="qbox">
      <div id="maru-overlay"><svg id="maru-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="width:min(75vw,280px);height:min(75vw,280px);animation:stamp .45s cubic-bezier(.2,1.6,.4,1) forwards"></svg></div>
      <div class="kanji-big">${q.kanji}</div>
      <div class="qtext">${q.q}</div>
      <div class="choices" id="choices">${q.c.map((c,i)=>`<button class="cbtn" id="cb${i}" onclick="pick(${i})">${c}</button>`).join('')}</div>
    </div>
    <div class="feedback" id="fb"></div>
    <div id="hint"></div>
    <button class="main-btn" id="nb" style="display:none" onclick="nextQ()">つぎのもんだい →</button>`;
}

function pick(i){
  if(answered)return;
  answered=true;
  const q=questions[current];
  document.querySelectorAll('.cbtn').forEach(b=>b.style.cursor='default');
  const fb=document.getElementById('fb');
  const hint=document.getElementById('hint');
  if(i===q.a){
    score++;
    document.getElementById('sv').textContent=score;
    document.getElementById('cb'+i).classList.add('correct');
    fb.innerHTML='<span style="color:#0f6e56;font-size:16px">大変よくできました。✨</span>';
    playCorrect();
    showMaru();
  } else {
    document.getElementById('cb'+i).classList.add('wrong');
    document.getElementById('cb'+q.a).classList.add('show-correct');
    fb.innerHTML='<span style="color:#a32d2d">ざんねん！こたえは「'+q.c[q.a]+'」だよ。</span>';
    playWrong();
  }
  hint.innerHTML=`<div class="hint-area"><b>かきじゅん：</b><br>${q.order.join('<br>')}<br><span style="color:#999">音読み：${q.on}　訓読み：${q.kun}</span></div>`;
  document.getElementById('nb').style.display='block';
}

function nextQ(){ current++; answered=false; render(); }
function setGrade(g){ grade=g; questions=[]; render(); }
function setMode(m){ mode=m; questions=[]; render(); }
function startGame(){ buildQuestions(); render(); }
function backMenu(){ questions=[]; render(); }

render();
</script>
</body>
</html>
